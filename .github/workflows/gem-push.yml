name: Publish Gem

on:
  push:
    tags: ["v*"]

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "4.0"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # gem build reads the version from the gemspec (RAILS_MCP_CODE_SEARCH_VERSION),
      # bypassing bundler so the dev-pinned Gemfile.lock doesn't trip frozen mode.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Build and push gem
        env:
          RAILS_MCP_CODE_SEARCH_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gem build rails_mcp_code_search.gemspec
          gem push "rails_mcp_code_search-${RAILS_MCP_CODE_SEARCH_VERSION}.gem"
