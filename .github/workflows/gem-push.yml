name: Publish Gem

on:
  push:
    tags: ["v*"]

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1
        with:
          ruby-version: "4.0"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # gem build reads the version from the gemspec (RAILS_MCP_CODE_SEARCH_VERSION),
      # bypassing bundler so the dev-pinned Gemfile.lock doesn't trip frozen mode.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0

      - name: Build and push gem
        env:
          RAILS_MCP_CODE_SEARCH_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gem build rails_mcp_code_search.gemspec
          gem push "rails_mcp_code_search-${RAILS_MCP_CODE_SEARCH_VERSION}.gem"
